<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Homepage - 云端个人主页</title>
    <style>
        :root {
            --bg-color: #0b0d14;
            --text-color: #fff;
            --card-bg: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.05);
            --input-bg: rgba(255,255,255,0.06);
            --input-border: rgba(255,255,255,0.08);
            --link-color: rgba(255,255,255,0.4);
            --link-hover: #fff;
            --text-secondary: rgba(255,255,255,0.5);
            --text-muted: rgba(255,255,255,0.3);
            --gradient-text: linear-gradient(135deg, #fff 0%, #8899bb 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, #1a2233, transparent 60%),
                        radial-gradient(circle at 80% 20%, #151a2a, transparent 60%),
                        radial-gradient(circle at 50% 80%, #0f1420, transparent 50%),
                        var(--bg-color);
            z-index: -1;
        }
        
        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px;
            animation: fadeIn .6s ease-out;
            position: relative;
            z-index: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            animation: slideUp .6s ease-out;
        }
        
        .time-section {
            position: relative;
        }
        
        .time {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -2px;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            transition: all .5s;
        }
        
        .time-seconds {
            font-size: 24px;
            opacity: 0.4;
            margin-left: 8px;
            -webkit-text-fill-color: var(--text-secondary);
        }
        
        .date {
            margin-top: 8px;
            opacity: .5;
            font-size: 16px;
            letter-spacing: 1px;
        }
        
        .weather-card {
            text-align: right;
            background: var(--card-bg);
            padding: 12px 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            min-width: 120px;
            position: relative;
            transition: all .3s;
        }
        
        .weather-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .weather-location {
            font-size: 12px;
            opacity: 0.5;
            margin-bottom: 4px;
            font-weight: 300;
        }
        
        .weather-temp {
            font-size: 28px;
            font-weight: 600;
        }
        
        .weather-icon {
            font-size: 32px;
            margin-right: 4px;
            display: inline-block;
            transition: transform .3s;
        }
        
        .weather-icon:hover {
            transform: scale(1.2) rotate(10deg);
        }
        
        .weather-desc {
            font-size: 13px;
            opacity: .6;
            margin-top: 4px;
        }
        
        .weather-wind {
            font-size: 12px;
            opacity: .4;
            margin-top: 2px;
        }
        
        .location-status {
            font-size: 11px;
            opacity: 0.4;
            margin-top: 4px;
            cursor: help;
        }
        
        .location-status .update-link {
            color: var(--text-secondary);
            text-decoration: underline;
            cursor: pointer;
        }
        
        .location-status .update-link:hover {
            color: var(--link-hover);
        }
        
        .search {
            width: 100%;
            margin: 30px 0 20px;
            animation: slideUp .6s ease-out .1s both;
        }
        
        .search input {
            width: 100%;
            padding: 18px 24px;
            border-radius: 999px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: all .3s ease;
            backdrop-filter: blur(10px);
        }
        
        .search input::placeholder {
            color: var(--text-muted);
        }
        
        .search input:focus {
            transform: translateY(-2px);
            border-color: var(--link-hover);
            box-shadow: 0 4px 20px rgba(0,0,0,.15);
        }
        
        .search input:hover {
            background: var(--card-bg);
            border-color: var(--link-color);
        }
        
        .search-history {
            margin-top: 8px;
            display: none;
        }
        
        .search-history.show {
            display: block;
            animation: slideUp .3s ease-out;
        }
        
        .search-history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            padding: 0 2px;
        }
        
        .search-history-header span {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .search-history-header button {
            background: none;
            border: none;
            color: rgba(255,255,255,.3);
            font-size: 11px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all .2s;
        }
        
        .search-history-header button:hover {
            color: #ff6b6b;
            background: rgba(255,107,107,.1);
        }
        
        .search-history-item {
            display: block;
            width: 100%;
            padding: 8px 12px;
            border: none;
            background: rgba(255,255,255,.04);
            color: rgba(255,255,255,.5);
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: all .2s;
        }
        
        .search-history-item:hover {
            background: rgba(255,255,255,.1);
            color: #fff;
            transform: translateX(4px);
        }
        
        .quick-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        
        .quick-links a {
            color: var(--link-color);
            text-decoration: none;
            font-size: 13px;
            transition: all .2s;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,.03);
        }
        
        .quick-links a:hover {
            color: var(--link-hover);
            background: var(--card-bg);
            transform: translateY(-2px);
        }
        
        .quote {
            margin-top: 50px;
            padding: 20px 0;
            border-top: 1px solid var(--card-border);
            opacity: .7;
            font-size: 16px;
            line-height: 1.8;
            transition: opacity .3s;
            animation: slideUp .6s ease-out .2s both;
        }
        
        .quote:hover {
            opacity: .9;
        }
        
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 70px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: all .3s;
        }
        
        .theme-toggle:hover {
            color: var(--link-hover);
            border-color: var(--link-hover);
            transform: rotate(180deg);
        }
        
        .quote-text {
            font-style: italic;
            letter-spacing: 0.5px;
        }
        
        .quote-author {
            display: block;
            margin-top: 8px;
            opacity: .5;
            font-size: 14px;
            font-style: normal;
        }
        
        .footer {
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
            animation: slideUp .6s ease-out .3s both;
        }
        
        .footer span {
            display: inline-block;
            transition: all .3s;
        }
        
        .footer span:hover {
            color: var(--text-secondary);
        }
        
        .location-prompt {
            display: block;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: slideUp .6s ease-out;
        }
        
        .location-prompt p {
            opacity: 0.7;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .location-prompt button {
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.15);
            color: var(--text-color);
            padding: 8px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all .3s;
        }
        
        .location-prompt button:hover {
            background: rgba(255,255,255,.2);
            transform: translateY(-1px);
        }
        
        .location-prompt button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            padding: 12px 24px;
            border-radius: 12px;
            color: var(--text-color);
            font-size: 14px;
            z-index: 1000;
            animation: fadeIn .3s ease-out;
            max-width: 90%;
            text-align: center;
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
            position: fixed;
            top: 20px;
            right: 140px;
            z-index: 100;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 6px 16px 6px 12px;
            transition: all .3s;
        }
        
        .user-section:hover {
            background: var(--card-bg);
            border-color: var(--link-color);
        }
        
        .user-avatar {
            font-size: 20px;
            line-height: 1;
        }
        
        .user-name {
            font-size: 13px;
            color: var(--text-secondary);
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .user-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            transition: all .2s;
        }
        
        .user-btn:hover {
            color: var(--link-hover);
            background: rgba(255,255,255,0.1);
        }
        
        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 4px;
            transition: all .3s;
        }
        
        .language-selector select {
            background: transparent;
            color: var(--text-color);
            border: none;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            border-radius: 6px;
            min-width: 100px;
        }
        
        .language-selector select:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .language-selector select option {
            background: #1a2233;
            color: #fff;
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }
            
            .time {
                font-size: 48px;
                letter-spacing: -1px;
            }
            
            .time-seconds {
                font-size: 18px;
            }
            
            .top {
                flex-direction: column;
                gap: 20px;
            }
            
            .weather-card {
                text-align: left;
                width: 100%;
                padding: 12px 16px;
            }
            
            .weather-temp {
                font-size: 24px;
            }
            
            .search input {
                padding: 14px 20px;
                font-size: 15px;
            }
            
            .quote {
                font-size: 14px;
                margin-top: 30px;
            }
            
            .footer {
                flex-direction: column;
                gap: 4px;
                font-size: 11px;
            }
            
            .location-prompt {
                padding: 12px 16px;
            }
            
            .language-selector {
                top: 10px;
                right: 10px;
                padding: 2px;
            }
            
            .language-selector select {
                font-size: 12px;
                padding: 4px 8px;
                min-width: 80px;
            }
            
            .theme-selector {
                top: 60px;
                right: 10px;
            }
            
            .theme-selector select {
                font-size: 11px;
                padding: 4px 8px;
                min-width: 70px;
            }
            
            .theme-toggle {
                top: 10px;
                right: 60px;
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
            
            .user-section {
                top: 10px;
                right: 110px;
                padding: 4px 12px 4px 8px;
            }
            
            .user-name {
                font-size: 11px;
                max-width: 60px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="切换主题">◐</button>
    
    <div class="user-section" id="userSection">
        <span class="user-avatar">👤</span>
        <span class="user-name" id="userName">访客</span>
        <button class="user-btn" onclick="showLoginModal()">登录</button>
    </div>
    
    <div class="bg"></div>
    
    <div class="language-selector">
        <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
        </select>
    </div>
    
    <div class="container">
        <div class="location-prompt" id="locationPrompt">
            <p>📍 启用位置服务查看您所在城市的实时天气</p>
            <button id="enableLocation" onclick="requestLocation()">🌐 允许获取位置</button>
        </div>
        
        <div class="top">
            <div class="time-section">
                <div class="time"><span id="clockDisplay">--:--</span><span class="time-seconds" id="secondsDisplay">00</span></div>
                <div class="date" id="dateDisplay">加载中...</div>
            </div>
            
            <div class="weather-card">
                <div class="weather-location">📍 东京</div>
                <div><span class="weather-icon">☀️</span><span class="weather-temp">24°C</span></div>
                <div class="weather-desc">晴朗</div>
                <div class="weather-wind">💨 5 km/h</div>
                <div class="location-status" id="locationStatus">📍 使用默认位置 · <span class="update-link" onclick="requestLocation()">更新位置</span></div>
            </div>
        </div>
        
        <div class="search">
            <input id="search" type="text" placeholder="搜索... (Enter 键搜索)" autofocus aria-label="搜索... (Enter 键搜索)">
            <div id="searchHistory" class="search-history">
                <div class="search-history-header">
                    <span>最近搜索</span>
                    <button id="clearHistory">清除</button>
                </div>
            </div>
            <div class="quick-links">
                <a href="https://www.google.com" target="_blank">Google</a>
                <a href="https://github.com" target="_blank">GitHub</a>
                <a href="https://news.ycombinator.com" target="_blank">Hacker News</a>
                <a href="https://www.reddit.com" target="_blank">Reddit</a>
            </div>
        </div>
        
        <div class="quote">
            <span class="quote-text">“少即是多”</span>
            <span class="quote-author">- 密斯·凡·德·罗</span>
        </div>
        
        <div class="footer">
            <span>📍 127.0.0.1</span>
            <span>Tokyo Japan</span>
            <span id="visitCounter" style="cursor:default;">👁 12345</span>
            <span>⚡ Cloudflare Edge</span>
        </div>
    </div>
    
    <!-- 登录/注册模态框 -->
    <div id="authModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);z-index:1000;justify-content:center;align-items:center;">
        <div style="background:var(--bg-color);border:1px solid var(--card-border);border-radius:20px;padding:40px;max-width:420px;width:90%;max-height:90vh;overflow-y:auto;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
                <h2 id="authModalTitle" style="font-size:24px;font-weight:700;background:var(--gradient-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">登录</h2>
                <button onclick="closeAuthModal()" style="background:none;border:none;color:var(--text-muted);font-size:24px;cursor:pointer;">×</button>
            </div>
            <div id="authForm">
                <div class="form-group" style="margin-bottom:16px;">
                    <label style="color:var(--text-secondary);font-size:13px;">用户名</label>
                    <input id="authUsername" type="text" style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text-color);font-size:16px;outline:none;"/>
                </div>
                <div class="form-group" style="margin-bottom:16px;">
                    <label style="color:var(--text-secondary);font-size:13px;">密码</label>
                    <input id="authPassword" type="password" style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text-color);font-size:16px;outline:none;"/>
                </div>
                <div id="authEmailGroup" class="form-group" style="margin-bottom:16px;display:none;">
                    <label style="color:var(--text-secondary);font-size:13px;">邮箱</label>
                    <input id="authEmail" type="email" style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text-color);font-size:16px;outline:none;"/>
                </div>
                <div id="authDisplayNameGroup" class="form-group" style="margin-bottom:16px;display:none;">
                    <label style="color:var(--text-secondary);font-size:13px;">显示名称</label>
                    <input id="authDisplayName" type="text" style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text-color);font-size:16px;outline:none;"/>
                </div>
                <button id="authSubmitBtn" onclick="handleAuth()" style="width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#4a6fa5,#8899bb);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s;">登录</button>
                <p id="authSwitchText" style="margin-top:16px;text-align:center;color:var(--text-muted);font-size:13px;cursor:pointer;" onclick="toggleAuthMode()">注册</p>
                <div id="authError" style="color:#ef4444;font-size:13px;margin-top:12px;display:none;text-align:center;"></div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据
        const mockWeatherData = {
            temp: "24°C",
            desc: "晴朗",
            icon: "☀️",
            windspeed: 5,
            location: "东京"
        };
        
        const mockQuote = {
            text: "少即是多",
            author: "密斯·凡·德·罗"
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateClock();
            setInterval(updateClock, 1000);
            
            // 设置日期
            const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const date = new Date().toLocaleDateString('zh-CN', dateOptions);
            document.getElementById('dateDisplay').textContent = date;
            
            // 模拟访问计数
            document.getElementById('visitCounter').textContent = '👁 ' + Math.floor(Math.random() * 10000 + 5000);
            
            // 搜索功能
            setupSearchFunctionality();
            
            // 主题切换
            setupThemeToggle();
            
            // 模拟加载动画
            setTimeout(() => {
                document.querySelector('.time').style.transform = 'translateY(0)';
                document.querySelector('.weather-card').style.transform = 'translateY(0)';
            }, 300);
        });
        
        // 时钟更新
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clockDisplay').textContent = `${hours}:${minutes}`;
            document.getElementById('secondsDisplay').textContent = seconds;
        }
        
        // 搜索功能
        function setupSearchFunctionality() {
            const searchInput = document.getElementById('search');
            const searchHistory = document.getElementById('searchHistory');
            const STORAGE_KEY = 'search_history';
            const MAX_HISTORY = 10;
            
            function loadHistory() {
                try {
                    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                } catch(_) {
                    return [];
                }
            }
            
            function saveHistory(query) {
                let history = loadHistory();
                history = history.filter(item => item !== query);
                history.unshift(query);
                if(history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
                } catch(_) {}
                return history;
            }
            
            function renderHistory(history) {
                const container = document.getElementById('searchHistory');
                if(!container) return;
                
                const header = container.querySelector('.search-history-header');
                container.innerHTML = '';
                if(header) container.appendChild(header);
                
                if(history.length === 0) {
                    container.classList.remove('show');
                    return;
                }
                
                for(let i = 0; i < history.length; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'search-history-item';
                    btn.textContent = history[i];
                    btn.addEventListener('click', function() {
                        const q = encodeURIComponent(this.textContent);
                        window.open('https://www.google.com/search?q=' + q, '_blank');
                        document.getElementById('search').value = '';
                        container.classList.remove('show');
                    });
                    container.appendChild(btn);
                }
                container.classList.add('show');
            }
            
            function doSearch(query) {
                const q = encodeURIComponent(query);
                window.open('https://www.google.com/search?q=' + q, '_blank');
                const history = saveHistory(query);
                renderHistory(history);
            }
            
            searchInput.addEventListener('keydown', function(e) {
                const val = this.value.trim();
                if(e.key === 'Enter' && val) {
                    doSearch(val);
                    this.value = '';
                    document.getElementById('searchHistory').classList.remove('show');
                }
            });
            
            searchInput.addEventListener('focus', function() {
                const history = loadHistory();
                if(history.length > 0) renderHistory(history);
            });
            
            searchInput.addEventListener('blur', function() {
                setTimeout(() => {
                    document.getElementById('searchHistory').classList.remove('show');
                }, 200);
            });
            
            document.getElementById('clearHistory').addEventListener('click', function() {
                try {
                    localStorage.removeItem(STORAGE_KEY);
                } catch(_) {}
                document.getElementById('searchHistory').classList.remove('show');
            });
        }
        
        // 主题切换
        function setupThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            
            function setTheme(theme) {
                html.setAttribute('data-theme', theme);
                document.cookie = `theme=${theme}; path=/; max-age=31536000; samesite=lax; Secure`;
                themeToggle.textContent = theme === 'light' ? '◑' : '◐';
            }
            
            themeToggle.addEventListener('click', function() {
                const current = html.getAttribute('data-theme') || 'dark';
                const themes = ['dark', 'light', 'ocean', 'forest', 'sunset', 'neon'];
                const idx = themes.indexOf(current);
                const next = themes[(idx + 1) % themes.length];
                setTheme(next);
            });
        }
        
        // 显示通知
        function showNotification(message) {
            const existing = document.querySelector('.notification');
            if(existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.5s';
                setTimeout(() => {
                    notification.remove();
                }, 500);
            }, 3000);
        }
        
        // 位置请求
        function requestLocation() {
            const button = document.getElementById('enableLocation');
            const t = { ui: { gettingLocation: '⏳ 获取中...', relocate: '🌐 重新定位', allowLocation: '🌐 允许获取位置' } };
            
            if(button) {
                button.disabled = true;
                button.textContent = t.ui.gettingLocation;
            }
            
            // 模拟位置获取
            setTimeout(() => {
                if(button) {
                    button.disabled = false;
                    button.textContent = t.ui.relocate;
                }
                
                // 更新天气信息
                document.querySelector('.weather-temp').textContent = '26°C';
                document.querySelector('.weather-desc').textContent = '多云转晴';
                document.querySelector('.weather-icon').textContent = '⛅';
                document.getElementById('locationStatus').innerHTML = '✅ 已定位 (精确)';
                
                // 隐藏位置提示
                document.getElementById('locationPrompt').style.display = 'none';
                
                showNotification('✅ 位置已更新，天气数据已刷新');
            }, 2000);
        }
        
        // 认证相关函数
        function showLoginModal() {
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('authUsername').focus();
        }
        
        function closeAuthModal() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('authError').style.display = 'none';
        }
        
        function toggleAuthMode() {
            const isLoginMode = document.getElementById('authSubmitBtn').textContent === '登录';
            
            if(isLoginMode) {
                // 切换到注册模式
                document.getElementById('authModalTitle').textContent = '注册';
                document.getElementById('authSubmitBtn').textContent = '注册';
                document.getElementById('authSwitchText').textContent = '登录';
                document.getElementById('authEmailGroup').style.display = 'block';
                document.getElementById('authDisplayNameGroup').style.display = 'block';
            } else {
                // 切换到登录模式
                document.getElementById('authModalTitle').textContent = '登录';
                document.getElementById('authSubmitBtn').textContent = '登录';
                document.getElementById('authSwitchText').textContent = '注册';
                document.getElementById('authEmailGroup').style.display = 'none';
                document.getElementById('authDisplayNameGroup').style.display = 'none';
            }
            document.getElementById('authError').style.display = 'none';
        }
        
        function handleAuth() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            const isLoginMode = document.getElementById('authSubmitBtn').textContent === '登录';
            
            if(!username || !password) {
                document.getElementById('authError').textContent = '❌ 用户名和密码为必填项';
                document.getElementById('authError').style.display = 'block';
                return;
            }
            
            const btn = document.getElementById('authSubmitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ ...';
            document.getElementById('authError').style.display = 'none';
            
            // 模拟认证过程
            setTimeout(() => {
                if(isLoginMode) {
                    document.getElementById('userName').textContent = username;
                    showNotification('✅ 欢迎回来，' + username);
                } else {
                    showNotification('✅ 注册成功，请登录');
                    toggleAuthMode();
                }
                
                btn.disabled = false;
                btn.textContent = isLoginMode ? '登录' : '注册';
                closeAuthModal();
            }, 1500);
        }
        
        // 语言切换
        function changeLanguage(lang) {
            const select = document.getElementById('languageSelect');
            if(select) select.disabled = true;
            
            const msgs = {
                zh: '⏳ 切换语言中...',
                en: '⏳ Switching language...',
                ja: '⏳ 言語を切り替え中...',
                ko: '⏳ 언어 전환 중...'
            };
            
            showNotification(msgs[lang] || msgs.en);
            
            // 模拟语言切换
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        }
    </script>
</body>
