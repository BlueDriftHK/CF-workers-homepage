<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="description" content="Edge Home 静态演示"/>
<title>Edge Home - 静态演示</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#0b0d14;
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, #1a2233, transparent 60%),
    radial-gradient(circle at 80% 20%, #151a2a, transparent 60%),
    radial-gradient(circle at 50% 80%, #0f1420, transparent 50%),
    #0b0d14;
  z-index:-1;
}

.bg::after{
  content:'';
  position:absolute;
  inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:0.5;
  pointer-events:none;
}

.container{
  width:100%;
  max-width:1000px;
  padding:40px;
  animation:fadeIn .6s ease-out;
  position:relative;
  z-index:1;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:40px;
}

.time-section{
  position:relative;
}

.time{
  font-size:72px;
  font-weight:700;
  letter-spacing:-2px;
  background:linear-gradient(135deg,#fff 0%,#8899bb 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}

.time-seconds{
  font-size:24px;
  opacity:0.4;
  margin-left:8px;
  -webkit-text-fill-color:rgba(255,255,255,0.4);
}

.date{
  margin-top:8px;
  opacity:.5;
  font-size:16px;
  letter-spacing:1px;
}

.weather-card{
  text-align:right;
  background:rgba(255,255,255,.03);
  padding:12px 20px;
  border-radius:16px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.05);
  min-width:120px;
  position:relative;
}

.weather-location{
  font-size:12px;
  opacity:0.5;
  margin-bottom:4px;
  font-weight:300;
}

.weather-temp{
  font-size:28px;
  font-weight:600;
}

.weather-icon{
  font-size:32px;
  margin-right:4px;
}

.weather-desc{
  font-size:13px;
  opacity:.6;
  margin-top:4px;
}

.weather-wind{
  font-size:12px;
  opacity:.4;
  margin-top:2px;
}

.location-status{
  font-size:11px;
  opacity:0.4;
  margin-top:4px;
  cursor:help;
}

.location-status .update-link{
  color:rgba(255,255,255,0.6);
  text-decoration:underline;
  cursor:pointer;
}

.location-status .update-link:hover{
  color:#fff;
}

.search{
  width:100%;
  margin:30px 0 20px;
}

.search input{
  width:100%;
  padding:18px 24px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.06);
  color:#fff;
  font-size:16px;
  outline:none;
  transition:all .3s ease;
  backdrop-filter:blur(10px);
}

.search input::placeholder{
  color:rgba(255,255,255,.3);
}

.search input:focus{
  transform:translateY(-2px);
  background:rgba(255,255,255,.12);
  border-color:rgba(255,255,255,.15);
  box-shadow:0 8px 30px rgba(0,0,0,.3);
}

.search input:hover{
  background:rgba(255,255,255,.09);
}

.quick-links{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:12px;
}

.quick-links a{
  color:rgba(255,255,255,.4);
  text-decoration:none;
  font-size:13px;
  transition:color .2s;
  padding:6px 12px;
  border-radius:20px;
  background:rgba(255,255,255,.03);
}

.quick-links a:hover{
  color:#fff;
  background:rgba(255,255,255,.08);
}

.quote{
  margin-top:50px;
  padding:20px 0;
  border-top:1px solid rgba(255,255,255,.05);
  opacity:.7;
  font-size:16px;
  line-height:1.8;
  transition:opacity .3s;
}

.quote:hover{
  opacity:.9;
}

.quote-text{
  font-style:italic;
  letter-spacing:0.5px;
}

.quote-author{
  display:block;
  margin-top:8px;
  opacity:.5;
  font-size:14px;
  font-style:normal;
}

.footer{
  margin-top:60px;
  opacity:.3;
  font-size:12px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:8px;
  padding-top:20px;
  border-top:1px solid rgba(255,255,255,.03);
}

.footer span{
  display:inline-block;
}

.location-prompt{
  display:block;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:16px 20px;
  margin-bottom:20px;
  text-align:center;
  backdrop-filter:blur(10px);
}

.location-prompt p{
  opacity:0.7;
  font-size:14px;
  margin-bottom:12px;
}

.location-prompt button{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  color:#fff;
  padding:8px 24px;
  border-radius:20px;
  cursor:pointer;
  font-size:14px;
  transition:all .3s;
}

.location-prompt button:hover{
  background:rgba(255,255,255,.2);
  transform:translateY(-1px);
}

.location-prompt button:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.notification{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  padding:12px 24px;
  border-radius:12px;
  color:#fff;
  font-size:14px;
  z-index:1000;
  animation:fadeIn 0.3s ease-out;
  max-width:90%;
  text-align:center;
}

.language-selector{
  position:fixed;
  top:20px;
  right:20px;
  z-index:100;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;
  padding:4px;
}

.language-selector select{
  background:transparent;
  color:#fff;
  border:none;
  padding:8px 12px;
  font-size:13px;
  cursor:pointer;
  outline:none;
  border-radius:6px;
  min-width:100px;
}

.language-selector select:hover{
  background:rgba(255,255,255,0.1);
}

.language-selector select option{
  background:#1a2233;
  color:#fff;
}

.demo-badge{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  padding:8px 16px;
  border-radius:20px;
  font-size:12px;
  opacity:0.4;
  z-index:100;
}

@media (max-width: 640px){
  .container{
    padding:20px;
  }
  
  .time{
    font-size:48px;
    letter-spacing:-1px;
  }
  
  .time-seconds{
    font-size:18px;
  }
  
  .top{
    flex-direction:column;
    gap:20px;
  }
  
  .weather-card{
    text-align:left;
    width:100%;
    padding:12px 16px;
  }
  
  .weather-temp{
    font-size:24px;
  }
  
  .search input{
    padding:14px 20px;
    font-size:15px;
  }
  
  .quote{
    font-size:14px;
    margin-top:30px;
  }
  
  .footer{
    flex-direction:column;
    gap:4px;
    font-size:11px;
  }
  
  .location-prompt{
    padding:12px 16px;
  }
  
  .language-selector{
    top:10px;
    right:10px;
    padding:2px;
  }
  
  .language-selector select{
    font-size:12px;
    padding:4px 8px;
    min-width:80px;
  }
  
  .demo-badge{
    font-size:10px;
    padding:6px 12px;
    bottom:10px;
  }
}
</style>
</head>

<!-- 语言选择器 -->

  </div>

  <div class="search">
    <input 
      id="search" 
      type="text" 
      placeholder="搜索... (Enter 键搜索)"
      autofocus
      aria-label="搜索框"

    <div class="quick-links">
      <a href="https://www.google.com" target="_blank">Google</a>
      <a href="https://github.com" target="_blank">GitHub</a>
      <a href="https://news.ycombinator.com" target="_blank">Hacker News</a>

  </div>

  <div class="quote">
    <span class="quote-text" id="quoteText">“少即是多”</span>
    <span class="quote-author" id="quoteAuthor">- 密斯·凡·德·罗</span>

  <div class="footer">
    <span id="footerIP">📍 192.168.1.1</span>
    <span id="footerLocation">北京 中国</span>
    <span>⚡ Cloudflare Edge</span>
  </div>
</div>

<div class="demo-badge">⚡ 静态演示 · 数据为模拟</div>

    // 更新位置提示
    document.getElementById('locationPromptText').textContent = t.ui.enableLocation;
    
    // 更新按钮文字
    var btn = document.getElementById('enableLocation');
    if (!btn._isLoading) {
      btn.textContent = t.ui.allowLocation;
    }
    
    // 更新天气
    document.getElementById('weatherIcon').textContent = weather.icon;
    document.getElementById('weatherTemp').textContent = weather.temp;
    document.getElementById('weatherDesc').textContent = weather.desc;
    document.getElementById('weatherWind').textContent = '💨 ' + weather.wind;
    document.getElementById('weatherLocation').textContent = weather.location;
    
    // 更新名言
    var quotes = t.quotes;
    var quote = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById('quoteText').textContent = '“' + quote.text + '”';
    document.getElementById('quoteAuthor').textContent = '- ' + quote.author;
    
    // 更新位置状态
    document.getElementById('locationStatus').innerHTML = 
      t.ui.usingDefault + ' · <span class="update-link" onclick="requestLocation()">' + t.ui.updateLocation + '</span>';
    
    // 更新搜索框
    document.getElementById('search').placeholder = t.ui.searchPlaceholder;
    
    // 更新页脚
    document.getElementById('footerIP').textContent = '📍 ' + ip.ip;
    document.getElementById('footerLocation').textContent = ip.location;
    
    // 更新日期格式
    updateClock();
  }

  // ============================================
  // 位置请求（模拟）
  // ============================================
  window.requestLocation = function() {
    var button = document.getElementById('enableLocation');
    var t = i18n[currentLang];
    
    button._isLoading = true;
    button.disabled = true;
    button.textContent = t.ui.gettingLocation;
    
    // 模拟定位请求
    setTimeout(function() {
      // 模拟成功
      var weather = {
        'zh': { icon: '☀️', temp: '28°C', desc: '晴朗', wind: '8 km/h', location: '📍 上海, 中国' },
        'en': { icon: '☀️', temp: '28°C', desc: 'Clear', wind: '8 km/h', location: '📍 Shanghai, China' },
        'ja': { icon: '☀️', temp: '28°C', desc: '晴れ', wind: '8 km/h', location: '📍 上海, 中国' },
        'ko': { icon: '☀️', temp: '28°C', desc: '맑음', wind: '8 km/h', location: '📍 상하이, 중국' }
      };
      
      weatherData[currentLang] = weather[currentLang] || weather['zh'];
      
      // 更新天气显示
      var w = weatherData[currentLang];
      document.getElementById('weatherIcon').textContent = w.icon;
      document.getElementById('weatherTemp').textContent = w.temp;
      document.getElementById('weatherDesc').textContent = w.desc;
      document.getElementById('weatherWind').textContent = '💨 ' + w.wind;
      document.getElementById('weatherLocation').textContent = w.location;
      
      // 隐藏位置提示
      document.getElementById('locationPrompt').style.display = 'none';
      
      // 更新状态
      document.getElementById('locationStatus').innerHTML = '✅ ' + t.ui.precise;
      document.getElementById('locationStatus').style.opacity = '0.6';
      
      showNotification(t.ui.locationUpdated);
      
      button._isLoading = false;
      button.disabled = false;
      button.textContent = t.ui.relocate;
    }, 1500);
  };

  // ============================================
  // 通知
  // ============================================
  function showNotification(message) {
    var existing = document.querySelector('.notification');
    if (existing) {
      existing.remove();
    }
    
    var notification = document.createElement('div');
    notification.className = 'notification';
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(function() {
      notification.style.opacity = '0';
      notification.style.transition = 'opacity 0.5s';
      setTimeout(function() { notification.remove(); }, 500);
    }, 3000);
  }

  // ============================================
  // 实时时钟（用户本地时区）
  // ============================================
  function updateClock() {
    var clockEl = document.getElementById('clockDisplay');
    var secondsEl = document.getElementById('secondsDisplay');
    var dateEl = document.getElementById('dateDisplay');
    if (!clockEl) return;
    
    var d = new Date();
    var h = String(d.getHours()).padStart(2, '0');
    var m = String(d.getMinutes()).padStart(2, '0');
    var s = String(d.getSeconds()).padStart(2, '0');
    
    clockEl.textContent = h + ':' + m;
    secondsEl.textContent = s;
    
    var langMap = {
      'zh': 'zh-CN',
      'en': 'en-US',
      'ja': 'ja-JP',
      'ko': 'ko-KR'
    };
    
    dateEl.textContent = d.toLocaleDateString(
      langMap[currentLang] || 'zh-CN',
      {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long'
      }
    );
  }

  // ============================================
  // 搜索功能
  // ============================================
  var searchInput = document.getElementById('search');
  if (searchInput) {
    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && this.value.trim()) {
        var query = encodeURIComponent(this.value.trim());
        window.open('https://www.google.com/search?q=' + query, '_blank');
        this.value = '';
      }
    });
    
    if (document.activeElement === document.body) {
      setTimeout(function() { searchInput.focus(); }, 100);
    }
  }

  // ============================================
  // 键盘快捷键
  // ============================================
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      var search = document.getElementById('search');
      if (search) search.focus();
    }
    if (e.key === 'Escape') {
      var search = document.getElementById('search');
      if (search && document.activeElement === search) {
        search.value = '';
        search.blur();
      }
    }
  });

  // ============================================
  // 初始化
  // ============================================
  updateClock();
  setInterval(updateClock, 1000);
  
  // 检测浏览器语言
  var browserLang = navigator.language || navigator.languages?.[0] || 'zh';
  var langMap = {
    'zh': 'zh',
    'zh-CN': 'zh',
    'zh-TW': 'zh',
    'en': 'en',
    'en-US': 'en',
    'ja': 'ja',
    'ja-JP': 'ja',
    'ko': 'ko',
    'ko-KR': 'ko'
  };
  var detectedLang = langMap[browserLang] || 'zh';
  document.getElementById('languageSelect').value = detectedLang;
  currentLang = detectedLang;
  updateUI(detectedLang);
  
  console.log('⚡ Edge Home - Static Demo');
  console.log('🌐 Language: ' + i18n[currentLang].name);
  console.log('🕐 Local timezone: ' + Intl.DateTimeFormat().resolvedOptions().timeZone);
  console.log('⌨️  Ctrl+K / Cmd+K Quick Search');
  console.log('💡 这是一个静态演示页面，所有数据均为模拟');
})();
</script>

</body>
</html>
